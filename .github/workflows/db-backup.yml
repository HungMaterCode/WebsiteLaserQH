name: Database Backup (Neon to R2)

on:
  schedule:
    - cron: '0 2 * * *' # Chạy vào lúc 2:00 sáng hàng ngày
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client 17
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg2 curl unzip
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -o pipefail
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="backup_${TIMESTAMP}.sql.gz"
          
          # Thực hiện Dump và nén bằng đúng bản pg_dump 17
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" | gzip > "$FILENAME"
          
          # Kiểm tra kích thước file
          FILESIZE=$(stat -c%s "$FILENAME")
          echo "Backup file size: $FILESIZE bytes"
          
          if [ $FILESIZE -le 100 ]; then
            echo "Error: Backup file is too small ($FILESIZE bytes). Something went wrong!"
            exit 1
          fi
          
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          # Use curl directly for S3 compatible R2 upload to avoid AWS CLI Signature v4 issues 
          # Or explicitly configure AWS CLI v4
          aws configure set default.s3.signature_version s3v4
          aws s3 cp ${{ env.FILENAME }} s3://${{ secrets.R2_BUCKET_NAME }}/database-backups/ \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --region auto
