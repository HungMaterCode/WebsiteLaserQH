name: Database Backup (Neon to R2)

on:
  schedule:
    - cron: '0 2 * * *' # Chạy vào lúc 2:00 sáng hàng ngày
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="backup_${TIMESTAMP}.sql.gz"
          pg_dump $DATABASE_URL | gzip > $FILENAME
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESSKEYID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ACCESSKEYSECRET }}
          AWS_DEFAULT_REGION: 'auto'
          ENDPOINT_URL: ${{ secrets.ENDPOINT }}
          BUCKET_NAME: ${{ secrets.BUCKET }}
        run: |
          aws s3 cp ${{ env.FILENAME }} s3://$BUCKET_NAME/database-backups/ --endpoint-url $ENDPOINT_URL
