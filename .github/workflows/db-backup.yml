name: Database Backup (Neon to R2)

on:
  schedule:
    - cron: '0 2 * * *' # Chạy vào lúc 2:00 sáng hàng ngày
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  backup:
    runs-on: ubuntu-latest
    container:
      image: postgres:17 # Sử dụng container có sẵn Postgres 17 Client
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          apt-get update
          apt-get install -y awscli

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -o pipefail
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="backup_${TIMESTAMP}.sql.gz"
          
          # Thực hiện Dump và nén (Sử dụng pg_dump v17 có sẵn trong container)
          pg_dump "$DATABASE_URL" | gzip > "$FILENAME"
          
          # Kiểm tra kích thước file
          FILESIZE=$(stat -c%s "$FILENAME")
          echo "Backup file size: $FILESIZE bytes"
          
          if [ $FILESIZE -le 100 ]; then
            echo "Error: Backup file is too small ($FILESIZE bytes). Something went wrong!"
            exit 1
          fi
          
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: 'auto'
        run: |
          aws s3 cp ${{ env.FILENAME }} s3://${{ secrets.R2_BUCKET_NAME }}/database-backups/ --endpoint-url ${{ secrets.R2_ENDPOINT }}
